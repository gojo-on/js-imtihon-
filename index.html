<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js imtihon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>CRUD OPERATIONS</h2>
            </div>
            <div class="admin-profile">
                <img src="./img/user-pic.png" alt="Admin" id="adminImg">
                <h3>Karthi Madesh</h3>
                <p>Admin</p>
            </div>
            <nav>
                <ul>
                    <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="#"><i class="fa-regular fa-bookmark"></i> Course</a></li>
                    <li class="active"><a href="#"><i class="fa-solid fa-graduation-cap"></i> Students</a></li>
                    <li><a href="#"><i class="fa-solid fa-dollar-sign"></i> Payment</a></li>
                    <li><a href="#"><i class="fa-solid fa-chart-line"></i> Report</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="logout">
                <a href="#">Logout <i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </aside>

        <main class="content">
            <header>
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div class="notifications">
                    <i class="fa-regular fa-bell"></i>
                </div>
            </header>

            <section class="students-section">
                <div class="section-header">
                    <h3>Students List</h3>
                    <div class="input-group">
                        <input type="text" id="name" placeholder="Ismi">
                        <input type="email" id="email" placeholder="Email">
                        <input type="text" id="phone" placeholder="Phone">
                        <input type="text" id="enroll" placeholder="Enroll Number">
                        <input type="date" id="date">
                    </div>
                    <button id="addStudentBtn">ADD NEW STUDENT</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th></th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Enroll Number</th>
                                <th>Date of admission</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
